<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>易宿 · 酒店管理平台</title>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;600;700&family=Noto+Sans+SC:wght@300;400;500;600&display=swap" rel="stylesheet" />
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.development.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.development.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.5/babel.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --gold: #C9A84C;
      --gold-light: #E8C97A;
      --gold-dim: #8B6914;
      --ink: #1A1510;
      --ink-muted: #4A3F30;
      --ink-light: #7A6E60;
      --paper: #FAF7F2;
      --paper-warm: #F5EFE3;
      --paper-card: #FFFDF8;
      --border: #E8DFC8;
      --border-dark: #C8B890;
      --red: #C0392B;
      --red-light: #FDEDEB;
      --green: #27AE60;
      --green-light: #EAFAF1;
      --blue: #2980B9;
      --blue-light: #EBF5FB;
      --orange: #E67E22;
      --orange-light: #FEF9E7;
      --shadow: 0 2px 12px rgba(26,21,16,0.08);
      --shadow-lg: 0 8px 32px rgba(26,21,16,0.12);
      --radius: 8px;
      --radius-lg: 16px;
    }

    html, body { height: 100%; }
    body {
      font-family: 'Noto Sans SC', sans-serif;
      background: var(--paper);
      color: var(--ink);
      line-height: 1.6;
    }

    /* ── Scrollbar ── */
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: var(--paper-warm); }
    ::-webkit-scrollbar-thumb { background: var(--border-dark); border-radius: 3px; }

    /* ── Layout ── */
    #root { min-height: 100vh; }

    .app-shell {
      display: flex;
      min-height: 100vh;
    }

    /* ── Sidebar ── */
    .sidebar {
      width: 240px;
      flex-shrink: 0;
      background: var(--ink);
      display: flex;
      flex-direction: column;
      position: fixed;
      top: 0; left: 0; bottom: 0;
      z-index: 100;
    }
    .sidebar-logo {
      padding: 28px 24px 20px;
      border-bottom: 1px solid rgba(201,168,76,0.2);
    }
    .sidebar-logo-text {
      font-family: 'Noto Serif SC', serif;
      font-size: 22px;
      font-weight: 700;
      color: var(--gold);
      letter-spacing: 2px;
    }
    .sidebar-logo-sub {
      font-size: 11px;
      color: var(--ink-light);
      margin-top: 2px;
      letter-spacing: 1px;
    }
    .sidebar-user {
      padding: 16px 24px;
      border-bottom: 1px solid rgba(255,255,255,0.06);
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .sidebar-avatar {
      width: 34px; height: 34px;
      border-radius: 50%;
      background: linear-gradient(135deg, var(--gold-dim), var(--gold));
      display: flex; align-items: center; justify-content: center;
      font-size: 14px; font-weight: 600; color: var(--ink);
    }
    .sidebar-user-info { flex: 1; min-width: 0; }
    .sidebar-user-name {
      font-size: 13px; font-weight: 500; color: #E8E0D0;
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }
    .sidebar-user-role {
      font-size: 11px; color: var(--gold);
      background: rgba(201,168,76,0.12);
      padding: 1px 6px; border-radius: 10px; display: inline-block; margin-top: 2px;
    }
    .sidebar-nav { flex: 1; padding: 16px 0; overflow-y: auto; }
    .sidebar-section {
      font-size: 10px; letter-spacing: 2px; color: #5A5045;
      padding: 8px 24px 4px; text-transform: uppercase;
    }
    .nav-item {
      display: flex; align-items: center; gap: 10px;
      padding: 10px 24px; cursor: pointer;
      color: #9A8E80; font-size: 13px; font-weight: 400;
      transition: all 0.2s; position: relative;
    }
    .nav-item:hover { color: #D4C4A0; background: rgba(255,255,255,0.04); }
    .nav-item.active {
      color: var(--gold-light);
      background: rgba(201,168,76,0.1);
    }
    .nav-item.active::before {
      content: '';
      position: absolute; left: 0; top: 4px; bottom: 4px;
      width: 3px; background: var(--gold); border-radius: 0 2px 2px 0;
    }
    .nav-icon { font-size: 16px; width: 20px; text-align: center; }
    .sidebar-footer {
      padding: 16px 24px;
      border-top: 1px solid rgba(255,255,255,0.06);
    }
    .btn-logout {
      width: 100%; padding: 8px; background: transparent;
      border: 1px solid rgba(255,255,255,0.1); border-radius: var(--radius);
      color: #7A6E60; font-size: 12px; cursor: pointer; transition: all 0.2s;
      font-family: 'Noto Sans SC', sans-serif;
    }
    .btn-logout:hover { background: rgba(192,57,43,0.15); border-color: rgba(192,57,43,0.4); color: #E74C3C; }

    /* ── Main Content ── */
    .main-content {
      flex: 1;
      margin-left: 240px;
      display: flex;
      flex-direction: column;
      min-height: 100vh;
    }
    .topbar {
      height: 56px; background: var(--paper-card);
      border-bottom: 1px solid var(--border);
      display: flex; align-items: center;
      padding: 0 32px;
      position: sticky; top: 0; z-index: 50;
      box-shadow: 0 1px 4px rgba(26,21,16,0.05);
    }
    .topbar-title {
      font-family: 'Noto Serif SC', serif;
      font-size: 16px; font-weight: 600; color: var(--ink);
    }
    .topbar-breadcrumb {
      font-size: 12px; color: var(--ink-light); margin-left: 12px;
    }
    .page-body { padding: 28px 32px; flex: 1; }

    /* ── Cards ── */
    .card {
      background: var(--paper-card);
      border: 1px solid var(--border);
      border-radius: var(--radius-lg);
      box-shadow: var(--shadow);
    }
    .card-header {
      padding: 20px 24px 16px;
      border-bottom: 1px solid var(--border);
      display: flex; align-items: center; justify-content: space-between;
    }
    .card-title {
      font-family: 'Noto Serif SC', serif;
      font-size: 15px; font-weight: 600; color: var(--ink);
    }
    .card-body { padding: 20px 24px; }

    /* ── Stat Cards ── */
    .stat-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 16px;
      margin-bottom: 24px;
    }
    .stat-card {
      background: var(--paper-card);
      border: 1px solid var(--border);
      border-radius: var(--radius-lg);
      padding: 20px 24px;
      position: relative; overflow: hidden;
    }
    .stat-card::before {
      content: '';
      position: absolute; top: 0; left: 0; right: 0;
      height: 3px;
    }
    .stat-card.gold::before { background: linear-gradient(90deg, var(--gold-dim), var(--gold)); }
    .stat-card.blue::before { background: linear-gradient(90deg, #1A6FA0, var(--blue)); }
    .stat-card.green::before { background: linear-gradient(90deg, #1A7A40, var(--green)); }
    .stat-card.orange::before { background: linear-gradient(90deg, #B85C10, var(--orange)); }
    .stat-label { font-size: 12px; color: var(--ink-light); margin-bottom: 8px; }
    .stat-value { font-size: 28px; font-weight: 700; color: var(--ink); font-variant-numeric: tabular-nums; }
    .stat-icon { position: absolute; right: 20px; top: 50%; transform: translateY(-50%); font-size: 28px; opacity: 0.15; }

    /* ── Buttons ── */
    .btn {
      display: inline-flex; align-items: center; gap: 6px;
      padding: 8px 16px; border-radius: var(--radius);
      font-size: 13px; font-weight: 500; cursor: pointer;
      border: none; transition: all 0.2s;
      font-family: 'Noto Sans SC', sans-serif;
      white-space: nowrap;
    }
    .btn-primary {
      background: linear-gradient(135deg, var(--gold-dim), var(--gold));
      color: var(--ink);
    }
    .btn-primary:hover { filter: brightness(1.1); box-shadow: 0 4px 12px rgba(201,168,76,0.4); }
    .btn-secondary {
      background: var(--paper-warm); color: var(--ink-muted);
      border: 1px solid var(--border-dark);
    }
    .btn-secondary:hover { background: var(--border); }
    .btn-danger {
      background: var(--red-light); color: var(--red);
      border: 1px solid rgba(192,57,43,0.2);
    }
    .btn-danger:hover { background: var(--red); color: white; }
    .btn-success {
      background: var(--green-light); color: var(--green);
      border: 1px solid rgba(39,174,96,0.2);
    }
    .btn-success:hover { background: var(--green); color: white; }
    .btn-ghost { background: transparent; color: var(--ink-muted); border: 1px solid var(--border); }
    .btn-ghost:hover { background: var(--paper-warm); }
    .btn-sm { padding: 5px 10px; font-size: 12px; }
    .btn:disabled { opacity: 0.5; cursor: not-allowed; }

    /* ── Status Badges ── */
    .badge {
      display: inline-flex; align-items: center; gap: 4px;
      padding: 3px 10px; border-radius: 20px;
      font-size: 11px; font-weight: 500;
    }
    .badge-dot { width: 5px; height: 5px; border-radius: 50%; }
    .badge-draft { background: #F0EDE8; color: #6B5E4E; }
    .badge-draft .badge-dot { background: #9A8878; }
    .badge-pending { background: var(--orange-light); color: var(--orange); }
    .badge-pending .badge-dot { background: var(--orange); }
    .badge-approved { background: var(--green-light); color: var(--green); }
    .badge-approved .badge-dot { background: var(--green); }
    .badge-rejected { background: var(--red-light); color: var(--red); }
    .badge-rejected .badge-dot { background: var(--red); }
    .badge-offline { background: #EAE8E5; color: #7A7068; }
    .badge-offline .badge-dot { background: #9A9088; }

    /* ── Table ── */
    .table-wrap { overflow-x: auto; }
    table { width: 100%; border-collapse: collapse; }
    th {
      background: var(--paper-warm);
      padding: 10px 16px;
      text-align: left;
      font-size: 12px; font-weight: 600; color: var(--ink-muted);
      border-bottom: 1px solid var(--border-dark);
      white-space: nowrap;
    }
    td {
      padding: 14px 16px;
      border-bottom: 1px solid var(--border);
      font-size: 13px; color: var(--ink);
      vertical-align: middle;
    }
    tr:last-child td { border-bottom: none; }
    tr:hover td { background: rgba(201,168,76,0.03); }
    .hotel-name-cell { font-weight: 600; font-size: 14px; }
    .hotel-name-en { font-size: 11px; color: var(--ink-light); margin-top: 2px; }
    .actions-cell { display: flex; gap: 6px; flex-wrap: wrap; }

    /* ── Forms ── */
    .form-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 20px;
    }
    .form-grid.three { grid-template-columns: 1fr 1fr 1fr; }
    .form-group { display: flex; flex-direction: column; gap: 6px; }
    .form-group.full { grid-column: 1 / -1; }
    label {
      font-size: 12px; font-weight: 600; color: var(--ink-muted);
      text-transform: uppercase; letter-spacing: 0.5px;
    }
    label .req { color: var(--red); margin-left: 2px; }
    input, select, textarea {
      width: 100%; padding: 9px 12px;
      border: 1px solid var(--border-dark);
      border-radius: var(--radius);
      background: white;
      font-size: 13px; color: var(--ink);
      font-family: 'Noto Sans SC', sans-serif;
      transition: border-color 0.2s, box-shadow 0.2s;
      outline: none;
    }
    input:focus, select:focus, textarea:focus {
      border-color: var(--gold);
      box-shadow: 0 0 0 3px rgba(201,168,76,0.15);
    }
    textarea { resize: vertical; min-height: 80px; }
    .form-hint { font-size: 11px; color: var(--ink-light); }

    /* ── Room type rows ── */
    .room-row {
      background: var(--paper-warm);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 16px;
      margin-bottom: 12px;
      position: relative;
    }
    .room-row-header {
      display: flex; justify-content: space-between; align-items: center;
      margin-bottom: 12px;
    }
    .room-row-title { font-size: 13px; font-weight: 600; color: var(--ink-muted); }

    /* ── Star selector ── */
    .star-selector { display: flex; gap: 4px; }
    .star-btn {
      background: none; border: none; cursor: pointer;
      font-size: 20px; padding: 2px; transition: transform 0.1s;
      line-height: 1;
    }
    .star-btn:hover { transform: scale(1.2); }

    /* ── Login page ── */
    .auth-bg {
      min-height: 100vh;
      background: var(--ink);
      display: flex; align-items: center; justify-content: center;
      position: relative; overflow: hidden;
    }
    .auth-bg::before {
      content: '';
      position: absolute; inset: 0;
      background: radial-gradient(ellipse at 30% 70%, rgba(201,168,76,0.08) 0%, transparent 60%),
                  radial-gradient(ellipse at 70% 30%, rgba(201,168,76,0.05) 0%, transparent 50%);
    }
    .auth-decoration {
      position: absolute;
      font-family: 'Noto Serif SC', serif;
      font-size: 160px; font-weight: 700;
      color: rgba(201,168,76,0.04);
      user-select: none; pointer-events: none;
      top: 50%; left: 50%; transform: translate(-50%, -50%);
      letter-spacing: 20px;
    }
    .auth-card {
      background: var(--paper-card);
      border-radius: 20px;
      width: 420px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.3);
      position: relative; z-index: 1;
      overflow: hidden;
    }
    .auth-header {
      background: var(--ink);
      padding: 32px 36px 24px;
      border-bottom: 2px solid var(--gold-dim);
      text-align: center;
    }
    .auth-logo {
      font-family: 'Noto Serif SC', serif;
      font-size: 32px; font-weight: 700;
      color: var(--gold);
      letter-spacing: 4px;
      margin-bottom: 4px;
    }
    .auth-tagline { font-size: 12px; color: #6A5E4E; letter-spacing: 2px; }
    .auth-tabs {
      display: flex; border-bottom: 1px solid var(--border);
    }
    .auth-tab {
      flex: 1; padding: 14px;
      text-align: center; cursor: pointer;
      font-size: 14px; font-weight: 500; color: var(--ink-light);
      border: none; background: none;
      border-bottom: 2px solid transparent;
      transition: all 0.2s;
      font-family: 'Noto Sans SC', sans-serif;
    }
    .auth-tab.active {
      color: var(--gold-dim); border-bottom-color: var(--gold);
    }
    .auth-body { padding: 28px 36px; }
    .auth-error {
      background: var(--red-light);
      border: 1px solid rgba(192,57,43,0.2);
      border-radius: var(--radius);
      padding: 10px 14px;
      font-size: 13px; color: var(--red);
      margin-bottom: 16px;
    }
    .auth-success {
      background: var(--green-light);
      border: 1px solid rgba(39,174,96,0.2);
      border-radius: var(--radius);
      padding: 10px 14px;
      font-size: 13px; color: var(--green);
      margin-bottom: 16px;
    }
    .auth-form-group { margin-bottom: 16px; }
    .auth-form-group label {
      display: block; margin-bottom: 6px;
      font-size: 12px; font-weight: 600; color: var(--ink-muted);
    }
    .role-select-group {
      display: flex; gap: 8px;
    }
    .role-option {
      flex: 1; padding: 10px;
      border: 2px solid var(--border);
      border-radius: var(--radius);
      text-align: center; cursor: pointer;
      transition: all 0.2s;
      font-size: 13px; color: var(--ink-muted);
    }
    .role-option:hover { border-color: var(--gold-dim); }
    .role-option.selected {
      border-color: var(--gold);
      background: rgba(201,168,76,0.08);
      color: var(--gold-dim);
      font-weight: 600;
    }
    .role-option .role-icon { font-size: 20px; display: block; margin-bottom: 4px; }

    /* ── Reject Modal ── */
    .modal-overlay {
      position: fixed; inset: 0;
      background: rgba(26,21,16,0.6);
      display: flex; align-items: center; justify-content: center;
      z-index: 200;
    }
    .modal-box {
      background: var(--paper-card);
      border-radius: var(--radius-lg);
      padding: 28px 32px;
      width: 440px;
      box-shadow: var(--shadow-lg);
    }
    .modal-title {
      font-family: 'Noto Serif SC', serif;
      font-size: 16px; font-weight: 600; margin-bottom: 16px;
    }
    .modal-actions { display: flex; gap: 10px; justify-content: flex-end; margin-top: 20px; }

    /* ── Empty state ── */
    .empty-state {
      text-align: center; padding: 60px 20px;
      color: var(--ink-light);
    }
    .empty-state-icon { font-size: 48px; margin-bottom: 12px; opacity: 0.4; }
    .empty-state-text { font-size: 14px; }

    /* ── Loading ── */
    .loading {
      text-align: center; padding: 60px;
      color: var(--ink-light);
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .spinner {
      display: inline-block;
      width: 24px; height: 24px;
      border: 2px solid var(--border-dark);
      border-top-color: var(--gold);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }

    /* ── Toast ── */
    .toast-container {
      position: fixed; top: 16px; right: 16px; z-index: 9999;
      display: flex; flex-direction: column; gap: 8px;
    }
    .toast {
      padding: 12px 20px;
      border-radius: var(--radius);
      font-size: 13px; font-weight: 500;
      box-shadow: var(--shadow-lg);
      animation: slideIn 0.3s ease;
      max-width: 320px;
    }
    @keyframes slideIn { from { transform: translateX(100%); opacity: 0; } to { transform: translateX(0); opacity: 1; } }
    .toast-success { background: #1E6640; color: white; }
    .toast-error { background: #8B1A1A; color: white; }
    .toast-info { background: var(--ink); color: var(--gold-light); }

    /* ── Misc ── */
    .section-divider {
      height: 1px; background: var(--border);
      margin: 24px 0;
    }
    .text-muted { color: var(--ink-light); font-size: 12px; }
    .flex { display: flex; }
    .flex-center { display: flex; align-items: center; }
    .gap-8 { gap: 8px; }
    .gap-12 { gap: 12px; }
    .mb-16 { margin-bottom: 16px; }
    .mb-24 { margin-bottom: 24px; }
    .hotel-detail-section { margin-bottom: 20px; }
    .detail-label { font-size: 11px; color: var(--ink-light); font-weight: 600; text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 4px; }
    .detail-value { font-size: 14px; color: var(--ink); }
    .filter-bar {
      display: flex; gap: 10px; margin-bottom: 20px; flex-wrap: wrap;
    }
    .filter-btn {
      padding: 6px 14px; border-radius: 20px;
      font-size: 12px; cursor: pointer; border: 1px solid var(--border-dark);
      background: white; color: var(--ink-muted); transition: all 0.2s;
      font-family: 'Noto Sans SC', sans-serif;
    }
    .filter-btn.active {
      background: var(--ink); color: var(--gold-light); border-color: var(--ink);
    }
    .drawer-overlay {
      position: fixed; inset: 0;
      background: rgba(26,21,16,0.5);
      z-index: 150;
    }
    .drawer {
      position: fixed; top: 0; right: 0; bottom: 0;
      width: 600px; max-width: 90vw;
      background: var(--paper-card);
      box-shadow: -4px 0 24px rgba(26,21,16,0.15);
      z-index: 151;
      display: flex; flex-direction: column;
      overflow: hidden;
    }
    .drawer-header {
      padding: 20px 28px;
      border-bottom: 1px solid var(--border);
      display: flex; align-items: center; justify-content: space-between;
    }
    .drawer-title {
      font-family: 'Noto Serif SC', serif;
      font-size: 16px; font-weight: 600;
    }
    .drawer-close {
      background: none; border: none; cursor: pointer;
      font-size: 20px; color: var(--ink-light); padding: 4px;
    }
    .drawer-body { flex: 1; overflow-y: auto; padding: 24px 28px; }
    .drawer-footer {
      padding: 16px 28px;
      border-top: 1px solid var(--border);
      display: flex; gap: 10px; justify-content: flex-end;
    }
    .reject-reason-box {
      background: var(--red-light);
      border: 1px solid rgba(192,57,43,0.2);
      border-radius: var(--radius);
      padding: 10px 14px;
      font-size: 12px; color: var(--red);
      margin-top: 8px;
    }
  </style>
</head>
<body>
<div id="root"></div>

<script type="text/babel" data-presets="react,env">
const { useState, useEffect, useCallback, useRef } = React;

const API = 'http://localhost:3001/api';

// ── Toast System ─────────────────────────────────────────────────────────────
let toastSetterRef = null;
function showToast(msg, type = 'info') {
  if (toastSetterRef) toastSetterRef(prev => [...prev, { id: Date.now(), msg, type }]);
}

function ToastContainer() {
  const [toasts, setToasts] = useState([]);
  toastSetterRef = setToasts;
  useEffect(() => {
    if (toasts.length === 0) return;
    const t = setTimeout(() => setToasts(prev => prev.slice(1)), 3000);
    return () => clearTimeout(t);
  }, [toasts]);
  return (
    <div className="toast-container">
      {toasts.map(t => (
        <div key={t.id} className={`toast toast-${t.type}`}>{t.msg}</div>
      ))}
    </div>
  );
}

// ── API Helper ───────────────────────────────────────────────────────────────
async function apiCall(path, method = 'GET', body = null) {
  const token = localStorage.getItem('hotel_token');
  const opts = {
    method,
    headers: { 'Content-Type': 'application/json', ...(token ? { Authorization: `Bearer ${token}` } : {}) },
  };
  if (body) opts.body = JSON.stringify(body);
  const res = await fetch(`${API}${path}`, opts);
  const data = await res.json();
  if (!res.ok) throw new Error(data.error || '请求失败');
  return data;
}

// ── Status Config ─────────────────────────────────────────────────────────────
const STATUS_MAP = {
  draft:    { label: '草稿', className: 'badge-draft' },
  pending:  { label: '待审核', className: 'badge-pending' },
  approved: { label: '已发布', className: 'badge-approved' },
  rejected: { label: '已拒绝', className: 'badge-rejected' },
  offline:  { label: '已下线', className: 'badge-offline' },
};

function StatusBadge({ status }) {
  const s = STATUS_MAP[status] || STATUS_MAP.draft;
  return (
    <span className={`badge ${s.className}`}>
      <span className="badge-dot"></span>{s.label}
    </span>
  );
}

// ── Stars ─────────────────────────────────────────────────────────────────────
function StarDisplay({ count }) {
  return <span style={{ color: '#C9A84C', fontSize: 14 }}>{'★'.repeat(count || 0)}{'☆'.repeat(5 - (count || 0))}</span>;
}

function StarSelector({ value, onChange }) {
  const [hover, setHover] = useState(0);
  return (
    <div className="star-selector">
      {[1,2,3,4,5].map(n => (
        <button key={n} className="star-btn"
          onMouseEnter={() => setHover(n)} onMouseLeave={() => setHover(0)}
          onClick={() => onChange(n)} type="button"
          style={{ color: n <= (hover || value) ? '#C9A84C' : '#DDD' }}>
          ★
        </button>
      ))}
    </div>
  );
}

// ── Auth Page ─────────────────────────────────────────────────────────────────
function AuthPage({ onLogin }) {
  const [tab, setTab] = useState('login');
  const [form, setForm] = useState({ username: '', password: '', confirm: '', name: '', role: 'merchant' });
  const [error, setError] = useState('');
  const [success, setSuccess] = useState('');
  const [loading, setLoading] = useState(false);

  const update = k => e => setForm(p => ({ ...p, [k]: e.target.value }));

  async function handleLogin(e) {
    e.preventDefault();
    setError(''); setLoading(true);
    try {
      const data = await apiCall('/login', 'POST', { username: form.username, password: form.password });
      localStorage.setItem('hotel_token', data.token);
      localStorage.setItem('hotel_user', JSON.stringify(data.user));
      onLogin(data.user);
    } catch (err) { setError(err.message); }
    setLoading(false);
  }

  async function handleRegister(e) {
    e.preventDefault();
    setError('');
    if (form.password !== form.confirm) return setError('两次密码不一致');
    if (form.password.length < 6) return setError('密码至少6位');
    setLoading(true);
    try {
      await apiCall('/register', 'POST', { username: form.username, password: form.password, role: form.role, name: form.name });
      setSuccess('注册成功！请登录');
      setTab('login');
    } catch (err) { setError(err.message); }
    setLoading(false);
  }

  return (
    <div className="auth-bg">
      <div className="auth-decoration">易宿</div>
      <div className="auth-card">
        <div className="auth-header">
          <div className="auth-logo">易宿</div>
          <div className="auth-tagline">酒店管理平台 · Hotel Management Platform</div>
        </div>
        <div className="auth-tabs">
          <button className={`auth-tab ${tab === 'login' ? 'active' : ''}`} onClick={() => { setTab('login'); setError(''); setSuccess(''); }}>登录</button>
          <button className={`auth-tab ${tab === 'register' ? 'active' : ''}`} onClick={() => { setTab('register'); setError(''); setSuccess(''); }}>注册</button>
        </div>
        <div className="auth-body">
          {error && <div className="auth-error">⚠ {error}</div>}
          {success && <div className="auth-success">✓ {success}</div>}

          {tab === 'login' ? (
            <form onSubmit={handleLogin}>
              <div className="auth-form-group">
                <label>用户名</label>
                <input value={form.username} onChange={update('username')} placeholder="请输入用户名" required />
              </div>
              <div className="auth-form-group">
                <label>密码</label>
                <input type="password" value={form.password} onChange={update('password')} placeholder="请输入密码" required />
              </div>
              <button className="btn btn-primary" style={{ width: '100%', padding: '12px', fontSize: 14, marginTop: 8 }} disabled={loading}>
                {loading ? '登录中...' : '登录'}
              </button>
            </form>
          ) : (
            <form onSubmit={handleRegister}>
              <div className="auth-form-group">
                <label>选择角色</label>
                <div className="role-select-group">
                  <div className={`role-option ${form.role === 'merchant' ? 'selected' : ''}`} onClick={() => setForm(p => ({ ...p, role: 'merchant' }))}>
                    <span className="role-icon">🏨</span>商户
                  </div>
                  <div className={`role-option ${form.role === 'admin' ? 'selected' : ''}`} onClick={() => setForm(p => ({ ...p, role: 'admin' }))}>
                    <span className="role-icon">🛡</span>管理员
                  </div>
                </div>
              </div>
              <div className="auth-form-group">
                <label>用户名 <span style={{ color: 'var(--red)' }}>*</span></label>
                <input value={form.username} onChange={update('username')} placeholder="请输入用户名" required />
              </div>
              <div className="auth-form-group">
                <label>显示名称</label>
                <input value={form.name} onChange={update('name')} placeholder="可选，如：北京希尔顿酒店" />
              </div>
              <div className="auth-form-group">
                <label>密码 <span style={{ color: 'var(--red)' }}>*</span></label>

    name_cn: '', name_en: '', address: '', star_level: 3,
    open_date: '', phone: '', description: '',
    facilities: '', nearby_attractions: '',
    room_types: [{ name: '标准间', price: '', discount_price: '', discount_desc: '', capacity: 2, area: '', bed_type: '大床', facilities: '' }],
    ...(hotel || {}),
    room_types: hotel?.room_types?.length ? hotel.room_types : [{ name: '标准间', price: '', discount_price: '', discount_desc: '', capacity: 2, area: '', bed_type: '大床', facilities: '' }]
  });
  const [saving, setSaving] = useState(false);

  const upd = k => e => setForm(p => ({ ...p, [k]: e.target.value }));
  const updRoom = (i, k, v) => setForm(p => {
    const r = [...p.room_types];
    r[i] = { ...r[i], [k]: v };
    return { ...p, room_types: r };
  });
  const addRoom = () => setForm(p => ({ ...p, room_types: [...p.room_types, { name: '', price: '', discount_price: '', discount_desc: '', capacity: 2, area: '', bed_type: '大床', facilities: '' }] }));
  const removeRoom = i => setForm(p => ({ ...p, room_types: p.room_types.filter((_, idx) => idx !== i) }));

  async function handleSave(submitAfter = false) {
    if (!form.name_cn || !form.address) return showToast('请填写酒店名称和地址', 'error');
    if (form.room_types.some(r => !r.name || !r.price)) return showToast('请完整填写所有房型信息', 'error');
    setSaving(true);
    try {
      let id;
      if (isEdit) {
        await apiCall(`/hotels/${hotel.id}`, 'PUT', form);
        id = hotel.id;
      } else {
        const res = await apiCall('/hotels', 'POST', form);
        id = res.id;
      }
      if (submitAfter) {
        await apiCall(`/hotels/${id}/submit`, 'POST');
        showToast('酒店信息已提交审核', 'success');
      } else {
        showToast(isEdit ? '保存成功' : '创建成功', 'success');
      }
      onSave();
    } catch (err) { showToast(err.message, 'error'); }
    setSaving(false);

      <div className="drawer">

        <div className="drawer-body">

          <div className="form-grid" style={{ marginBottom: 16 }}>
            <div className="form-group">
              <label>酒店名称（中文）<span className="req">*</span></label>
              <input value={form.name_cn} onChange={upd('name_cn')} placeholder="如：北京丽思卡尔顿酒店" />
            </div>
            <div className="form-group">
              <label>酒店名称（英文）</label>
              <input value={form.name_en} onChange={upd('name_en')} placeholder="如：The Ritz-Carlton Beijing" />
            </div>
            <div className="form-group full">
              <label>酒店地址<span className="req">*</span></label>
              <input value={form.address} onChange={upd('address')} placeholder="请输入完整地址" />
            </div>
            <div className="form-group">
              <label>酒店星级</label>
              <StarSelector value={form.star_level} onChange={v => setForm(p => ({ ...p, star_level: v }))} />
            </div>
            <div className="form-group">
              <label>开业时间</label>
              <input type="date" value={form.open_date} onChange={upd('open_date')} />
            </div>
            <div className="form-group">
              <label>联系电话</label>
              <input value={form.phone} onChange={upd('phone')} placeholder="前台电话" />
            </div>
            <div className="form-group full">
              <label>酒店简介</label>
              <textarea value={form.description} onChange={upd('description')} placeholder="酒店特色、服务介绍等..." rows={3} />
            </div>
            <div className="form-group">
              <label>配套设施</label>
              <input value={form.facilities} onChange={upd('facilities')} placeholder="如：游泳池、健身中心、餐厅、停车场" />

                <div className="form-group">
                  <label>面积(m²)</label>
                  <input type="number" value={room.area} onChange={e => updRoom(i, 'area', e.target.value)} placeholder="如：38" />
                </div>
                <div className="form-group full">
                  <label>优惠说明</label>
                  <input value={room.discount_desc} onChange={e => updRoom(i, 'discount_desc', e.target.value)} placeholder="如：节日特惠8折 / 机票+酒店套餐减200元" />
                </div>
                <div className="form-group full">
                  <label>房型设施</label>
                  <input value={room.facilities} onChange={e => updRoom(i, 'facilities', e.target.value)} placeholder="如：免费WiFi、空调、电视、浴缸" />
                </div>
              </div>
            </div>
          ))}
        </div>
        <div className="drawer-footer">
          <button className="btn btn-secondary" onClick={onClose}>取消</button>
          <button className="btn btn-ghost" onClick={() => handleSave(false)} disabled={saving}>保存草稿</button>

            {saving ? '提交中...' : '保存并提交审核'}
          </button>
        </div>
      </div>
    </>
  );
}

function HotelDetailDrawer({ hotel, onClose, user, onAction }) {
  const [rejectModal, setRejectModal] = useState(false);
  const [rejectReason, setRejectReason] = useState('');
  const [loading, setLoading] = useState(false);

  async function doAction(action) {
    setLoading(true);
    try {
      if (action === 'reject') {
        await apiCall(`/admin/hotels/${hotel.id}/reject`, 'POST', { reason: rejectReason });
        setRejectModal(false);
      } else if (action === 'approve') {
        await apiCall(`/admin/hotels/${hotel.id}/approve`, 'POST');
      } else if (action === 'offline') {
        await apiCall(`/admin/hotels/${hotel.id}/offline`, 'POST');
      } else if (action === 'online') {
        await apiCall(`/admin/hotels/${hotel.id}/online`, 'POST');
      } else if (action === 'submit') {
        await apiCall(`/hotels/${hotel.id}/submit`, 'POST');
      }
      showToast('操作成功', 'success');
      onAction();
    } catch (err) { showToast(err.message, 'error'); }

  const minPrice = rooms.length ? Math.min(...rooms.map(r => r.discount_price || r.price)) : null;

          {hotel.status === 'rejected' && hotel.reject_reason && (
            <div className="reject-reason-box">
              <strong>拒绝原因：</strong>{hotel.reject_reason}
            </div>
          )}

          <div className="form-grid" style={{ marginBottom: 0 }}>
            <div className="hotel-detail-section">
              <div className="detail-label">地址</div>
              <div className="detail-value">{hotel.address}</div>

            <div className="hotel-detail-section">

            <div className="hotel-detail-section">

            </div>
            <div className="hotel-detail-section full" style={{ gridColumn: '1/-1' }}>
              <div className="detail-label">酒店简介</div>
              <div className="detail-value">{hotel.description || '—'}</div>
            </div>
            <div className="hotel-detail-section">
              <div className="detail-label">配套设施</div>
              <div className="detail-value">{hotel.facilities || '—'}</div>
            </div>
            <div className="hotel-detail-section">
              <div className="detail-label">周边景点/交通</div>
              <div className="detail-value">{hotel.nearby_attractions || '—'}</div>

          )}
          {user.role === 'admin' && hotel.status === 'approved' && (
            <button className="btn btn-ghost" onClick={() => doAction('offline')} disabled={loading}>下线</button>
          )}
          {user.role === 'admin' && hotel.status === 'offline' && (
            <button className="btn btn-success" onClick={() => doAction('online')} disabled={loading}>恢复上线</button>
          )}
        </div>
      </div>

      {rejectModal && (
        <div className="modal-overlay">
          <div className="modal-box">
            <div className="modal-title">填写拒绝原因</div>
            <textarea rows={4} value={rejectReason} onChange={e => setRejectReason(e.target.value)} placeholder="请说明拒绝原因，帮助商户改进..." style={{ width: '100%' }} />
            <div className="modal-actions">
              <button className="btn btn-secondary" onClick={() => setRejectModal(false)}>取消</button>
              <button className="btn btn-danger" onClick={() => doAction('reject')} disabled={loading || !rejectReason.trim()}>确认拒绝</button>
            </div>
          </div>
        </div>
      )}
    </>
  );
}

        <div className="stat-card blue">
          <div className="stat-label">待审核</div>
          <div className="stat-value">{counts.pending || 0}</div>
          <div className="stat-icon">⏳</div>
        </div>
        <div className="stat-card green">
          <div className="stat-label">已发布</div>
          <div className="stat-value">{counts.approved || 0}</div>
          <div className="stat-icon">✅</div>
        </div>
        <div className="stat-card orange">
          <div className="stat-label">已拒绝</div>
          <div className="stat-value">{counts.rejected || 0}</div>
          <div className="stat-icon">❌</div>
        </div>
      </div>

      {/* Table Card */}
      <div className="card">
        <div className="card-header">
          <div className="card-title">
            {user.role === 'admin' ? '酒店审核管理' : '我的酒店'}
          </div>
          {user.role === 'merchant' && (
            <button className="btn btn-primary btn-sm" onClick={() => { setFormHotel(null); setShowForm(true); }}>
              + 录入新酒店
            </button>
          )}
        </div>
        <div className="card-body">
          <div className="filter-bar">
            {FILTERS.map(([v, l]) => (
              <button key={v} className={`filter-btn ${filter === v ? 'active' : ''}`} onClick={() => setFilter(v)}>
                {l}{v !== 'all' && counts[v] ? ` (${counts[v]})` : ''}
              </button>
            ))}
          </div>

          {loading ? (
            <div className="loading"><div className="spinner"></div></div>
          ) : filtered.length === 0 ? (
            <div className="empty-state">
              <div className="empty-state-icon">🏨</div>
              <div className="empty-state-text">{filter === 'all' ? '暂无酒店数据' : '暂无该状态的酒店'}</div>
              {user.role === 'merchant' && filter === 'all' && <button className="btn btn-primary" style={{ marginTop: 16 }} onClick={() => setShowForm(true)}>录入第一家酒店</button>}
            </div>
          ) : (
            <div className="table-wrap">
              <table>
                <thead>
                  <tr>
                    <th>酒店名称</th>
                    <th>星级</th>
                    <th>地址</th>
                    {user.role === 'admin' && <th>商户</th>}
                    <th>状态</th>
                    <th>最低价</th>
                    <th>更新时间</th>
                    <th>操作</th>
                  </tr>
                </thead>
                <tbody>
                  {filtered.map(h => {
                    const rooms = h.room_types || [];
                    const minP = rooms.length ? Math.min(...rooms.map(r => r.discount_price || r.price)) : null;
                    const dateStr = h.updated_at ? h.updated_at.substring(0, 10) : '—';
                    return (
                      <tr key={h.id}>
                        <td>
                          <div className="hotel-name-cell">{h.name_cn}</div>
                          {h.name_en && <div className="hotel-name-en">{h.name_en}</div>}
                        </td>
                        <td><StarDisplay count={h.star_level} /></td>
                        <td style={{ maxWidth: 180, whiteSpace: 'nowrap', overflow: 'hidden', textOverflow: 'ellipsis' }}>{h.address}</td>
                        {user.role === 'admin' && <td>{h.merchant_name}</td>}
                        <td>
                          <StatusBadge status={h.status} />
                          {h.status === 'rejected' && <div style={{ fontSize: 11, color: 'var(--red)', marginTop: 3, maxWidth: 120, overflow: 'hidden', textOverflow: 'ellipsis', whiteSpace: 'nowrap' }}>{h.reject_reason}</div>}
                        </td>
                        <td>{minP ? <span style={{ fontWeight: 600, color: 'var(--gold-dim)' }}>¥{minP}</span> : '—'}</td>
                        <td className="text-muted">{dateStr}</td>
                        <td>
                          <div className="actions-cell">
                            <button className="btn btn-ghost btn-sm" onClick={() => setDetailHotel(h)}>查看</button>
                            {user.role === 'merchant' && ['draft', 'rejected'].includes(h.status) && (
                              <button className="btn btn-secondary btn-sm" onClick={() => { setFormHotel(h); setShowForm(true); }}>编辑</button>
                            )}
                          </div>
                        </td>
                      </tr>
                    );
                  })}
                </tbody>
              </table>
            </div>
          )}
        </div>
      </div>

      {showForm && (
        <HotelFormDrawer
          hotel={formHotel}
          onClose={() => setShowForm(false)}
          onSave={() => { setShowForm(false); load(); }}
        />
      )}
      {detailHotel && (
        <HotelDetailDrawer
          hotel={detailHotel}
          user={user}
          onClose={() => setDetailHotel(null)}
          onAction={() => { setDetailHotel(null); load(); }}
        />
      )}
    </div>
  );
}

// ── Dashboard ─────────────────────────────────────────────────────────────────
function DashboardPage({ user }) {
  const [hotels, setHotels] = useState([]);
  useEffect(() => {
    apiCall('/hotels').then(setHotels).catch(() => {});
  }, []);

  const counts = hotels.reduce((acc, h) => { acc[h.status] = (acc[h.status] || 0) + 1; return acc; }, {});
  const recentHotels = [...hotels].sort((a,b) => new Date(b.updated_at) - new Date(a.updated_at)).slice(0, 5);

  return (
    <div>
      <div className="stat-grid">
        <div className="stat-card gold">
          <div className="stat-label">总酒店数</div>
          <div className="stat-value">{hotels.length}</div>
          <div className="stat-icon">🏨</div>
        </div>
        <div className="stat-card blue">
          <div className="stat-label">待审核</div>
          <div className="stat-value">{counts.pending || 0}</div>
          <div className="stat-icon">⏳</div>
        </div>
        <div className="stat-card green">
          <div className="stat-label">已发布</div>
          <div className="stat-value">{counts.approved || 0}</div>
          <div className="stat-icon">✅</div>
        </div>
        <div className="stat-card orange">
          <div className="stat-label">已下线</div>
          <div className="stat-value">{counts.offline || 0}</div>
          <div className="stat-icon">📴</div>
        </div>
      </div>

      <div className="card">
        <div className="card-header">
          <div className="card-title">最近更新</div>
        </div>
        <div className="card-body">
          {recentHotels.length === 0 ? (
            <div className="empty-state" style={{ padding: '30px' }}>
              <div className="empty-state-text">暂无数据</div>
            </div>
          ) : (
            <div className="table-wrap">
              <table>
                <thead><tr><th>酒店名称</th><th>状态</th><th>更新时间</th></tr></thead>
                <tbody>
                  {recentHotels.map(h => (
                    <tr key={h.id}>
                      <td><strong>{h.name_cn}</strong></td>
                      <td><StatusBadge status={h.status} /></td>
                      <td className="text-muted">{h.updated_at?.substring(0,16).replace('T',' ')}</td>
                    </tr>
                  ))}
                </tbody>
              </table>
            </div>
          )}
        </div>
      </div>

      <div className="card" style={{ marginTop: 20, background: 'linear-gradient(135deg, var(--ink) 0%, #2A2018 100%)', borderColor: 'var(--gold-dim)' }}>
        <div className="card-body">
          <div style={{ display: 'flex', alignItems: 'center', gap: 16 }}>
            <div style={{ fontSize: 36 }}>{user.role === 'admin' ? '🛡' : '🏨'}</div>
            <div>
              <div style={{ fontFamily: 'Noto Serif SC, serif', fontSize: 16, fontWeight: 600, color: 'var(--gold-light)', marginBottom: 4 }}>
                欢迎回来，{user.name}
              </div>
              <div style={{ fontSize: 13, color: '#9A8E80' }}>
                {user.role === 'admin'
                  ? `当前有 ${counts.pending || 0} 家酒店等待审核，请及时处理。`
                  : `您共有 ${hotels.length} 家酒店，其中 ${counts.approved || 0} 家已发布。`}
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>
  );
}

// ── Main App ──────────────────────────────────────────────────────────────────
const PAGES = {
  dashboard: '控制台',
  hotels: '酒店管理',
};

const NAV_MERCHANT = [
  { key: 'dashboard', icon: '📊', label: '控制台' },
  { key: 'hotels', icon: '🏨', label: '我的酒店' },
];

const NAV_ADMIN = [
  { key: 'dashboard', icon: '📊', label: '控制台' },
  { key: 'hotels', icon: '🔍', label: '审核管理' },
];

function App() {
  const [user, setUser] = useState(() => {
    try { return JSON.parse(localStorage.getItem('hotel_user')); } catch { return null; }
  });
  const [page, setPage] = useState('dashboard');

  function handleLogin(u) { setUser(u); setPage('dashboard'); }
  function handleLogout() {
    localStorage.removeItem('hotel_token');
    localStorage.removeItem('hotel_user');
    setUser(null);
  }

  if (!user) return <AuthPage onLogin={handleLogin} />;

  const navItems = user.role === 'admin' ? NAV_ADMIN : NAV_MERCHANT;

  return (
    <div className="app-shell">
      <div className="sidebar">
        <div className="sidebar-logo">
          <div className="sidebar-logo-text">易宿</div>
          <div className="sidebar-logo-sub">HOTEL MANAGEMENT</div>
        </div>
        <div className="sidebar-user">
          <div className="sidebar-avatar">{user.name?.charAt(0) || user.username?.charAt(0)}</div>
          <div className="sidebar-user-info">
            <div className="sidebar-user-name">{user.name || user.username}</div>
            <div className="sidebar-user-role">{user.role === 'admin' ? '管理员' : '商户'}</div>
          </div>
        </div>
        <div className="sidebar-nav">
          {navItems.map(item => (
            <div key={item.key} className={`nav-item ${page === item.key ? 'active' : ''}`} onClick={() => setPage(item.key)}>
              <span className="nav-icon">{item.icon}</span>
              {item.label}
            </div>
          ))}
        </div>
        <div className="sidebar-footer">
          <button className="btn-logout" onClick={handleLogout}>退出登录</button>
        </div>
      </div>

      <div className="main-content">
        <div className="topbar">
          <div className="topbar-title">{PAGES[page] || page}</div>
          <div className="topbar-breadcrumb">易宿管理平台 / {PAGES[page]}</div>
        </div>
        <div className="page-body">
          {page === 'dashboard' && <DashboardPage user={user} />}
          {page === 'hotels' && <HotelsPage user={user} />}
        </div>
      </div>

      <ToastContainer />
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
